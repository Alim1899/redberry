<html lang="ge">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/e68e90bb61.js" crossorigin="anonymous"></script>
    <script defer src="script.js"></script>
    <link rel="icon" href="images/logo.svg" type="image/icon type">
    <link rel="stylesheet" href="firstPage.css" type="text/css">
    <link rel="stylesheet" href="info.css" type="text/css">


    <title>CV Generator</title>
</head>
<body>
    <div class="hidden firstPage">
        <img class="background" src="./images/background.jfif"/>
      <div class="logo">
         <img  src="./images/logo.svg"/>
          <hr class="line">
      </div>
      <div class="start">
      <button class="addResume">რეზიუმეს დამატება</button>
      </div>
       
    </div>

    <div class="info">
        
        <i class="fa-solid fa-chevron-left"></i>
        <div class="container">
           
            <h2 class="infoHead">პირადი ინფო <span>1/3</span></h2>
            <form style="width:50%; float:left" class="inputDetails">
                <div class="nameAndLastname">
                 
            <label class="nameLabel" for="name"><h4>სახელი</h4>
                <input type="text" placeholder="  ანზორ" id="name" class="name" autocomplete="off" required>
                 <h6 class="minSymbol">მინიმუმ 2 ასო. ქართული ასოები</h6></label>

            <label class="lastnameLabel" for="lastname">
                <h4>გვარი</h4><input placeholder="  მუმლაძე" type="text" id="lastname" class="lastname" required>
                 <h6 class="minSymbol">მინიმუმ 2 ასო. ქართული ასოები</h6></label>

                </div>

                <label for="imageUpload" class="image">პირადი ფოტოს ატვირთვა
                    <input id="imageUpload" type="file" class="imageInput" name="img" accept="image/*" required>
                    <span >ატვირთვა</span>
                </label>
           
           <br>

           <label for="quote" class="aboutMe">ჩემ შესახებ (არასავალდებულო)
            <textarea class="quote" id="quote" placeholder="ზოგადი ინფო შენ შესახებ" type="text"></textarea></label>
            
           
           <label class="emailLabel">
            <h5>ელ.ფოსტა</h5>
          <input class="email" type="email" required placeholder="anzori666@redberry.ge">
          <h6 style="font-weight: lighter;">უნდა მთავრდებოდეს redberry.com-ით</h6>
        </label>

        <label class="numberLabel">
            <h5>მობილურის ნომერი</h5>
        <input class="number" type="number" required placeholder="+995 551 12 34 56">
        <h6 style="font-weight: lighter;">უნდა აკმაყოფილებდეს ქართული მობილური ნომრის ფორმატს</h6>

        </label>
          <button class="submit" type="submit">შემდეგი</button>

                </form>

            <div style="width:50%;" class="resume">
                
                <h1 class="fullName" value="ragaca"></h1>
                <p class="resumeDetails"></p>
                <h4 class="resumeEmail"></h4>
                <h4 class="resumeNumber"></h4>
                
                <div class="icon">
                     <img class="logoIcon" src="./images/logo-icon.svg">
                </div>
                    
            </div>
            
        </div>
        
    </div>
</body>
</html>
