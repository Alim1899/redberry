<html lang="ge">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/e68e90bb61.js"
      crossorigin="anonymous"
    ></script>
    <script defer src="script.js"></script>
    <link rel="icon" href="images/logo.svg" type="image/icon type" />
    <link rel="stylesheet" href="firstPage.css" type="text/css" />
    <link rel="stylesheet" href="info.css" type="text/css" />
    <link rel="stylesheet" href="resume.css" type="text/css" />
    <link rel="stylesheet" href="experience.css" type="text/css" />
    <link rel="stylesheet" href="education.css" type="text/css" />


    <head>
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    </head>
    <title>CV Generator</title>
  </head>
  <body>
    <div class="firstPage" id="firstPage">
      <img class="background" src="./images/background.jfif" />
      <div class="logo">
        <img src="./images/logo.svg" />
        <hr class="line" />
      </div>
      <div class="start">
        <button class="addResume"><a>რეზიუმეს დამატება</a></button>
      </div>
    </div>

    <div class="info" id="info">
      <div class="container">
        <i class="fa-solid fa-chevron-left back"></a></i>

        <h2 class="infoHead">პირადი ინფო <span class="infoSpan">1/3</span></h2>
        <form style="width: 55%; float: left" class="inputDetails hide">
          <div class="nameAndLastname">
            <label class="nameLabel" for="name">
              <h4>სახელი</h4>
              <input
                type="text"
                placeholder="  ანზორ"
                id="name"
                class="name"
                pattern="^[ა-ჰ]+$"
                title="მინიმუმ 2 ასო. ქართული ასოები"
                minlength="2"
                required
              />
              <i class="fa-solid fa-circle-check show-name hidden"></i>
              <i class="fa-solid fa-triangle-exclamation hide-name hidden"></i>
              <h6 class="message minSymbol">მინიმუმ 2 ასო. ქართული ასოები</h6>
            </label>

            <label class="lastnameLabel" for="lastname">
              <h4>გვარი</h4>
              <input
                placeholder="  მუმლაძე"
                type="text"
                id="lastname"
                class="lastname"
                pattern="^[ა-ჰ]+$"
                title="მინიმუმ 2 ასო. ქართული ასოები"
                minlength="2"
                required
              />
              <i class="fa-solid fa-circle-check show-lastname hidden"></i>
              <i
                class="fa-solid fa-triangle-exclamation hide-lastname hidden"
              ></i>
              <h6 class="minSymbol message">მინიმუმ 2 ასო. ქართული ასოები</h6>
            </label>
          </div>

          <label class="image"
            >პირადი ფოტოს ატვირთვა
            <input
              type="file"
              class="imageInput"
              id="image"
              name="img"
              accept="image/*"
              required
            />
            <span>ატვირთვა</span>
          </label>

          <br />

          <label for="about" class="aboutMe"
            >ჩემ შესახებ (არასავალდებულო)
            <textarea
              class="quote"
              id="about"
              placeholder="ზოგადი ინფო შენ შესახებ"
              pattern="^[ა-ჰ]+$"
              type="text"
            ></textarea>
          </label>

          <label class="emailLabel">
            <h5>ელ.ფოსტა</h5>
            <input
              class="email"
              id="email"
              type="email"
              required
              placeholder="anzori666@redberry.ge"
              pattern=".+@redberry\.ge"
              title="უნდა მთავრდებოდეს redberry.ge-ით"
              required
            />
            <i class="fa-solid fa-circle-check show-email hidden"></i>
            <i class="fa-solid fa-triangle-exclamation hide-email hidden"></i>
            <h6 class="message" style="font-weight: lighter">
              უნდა მთავრდებოდეს redberry.ge-ით
            </h6>
          </label>

          <label class="numberLabel">
            <h5>მობილურის ნომერი</h5>
            <input
              class="number"
              id="number"
              pattern="([+]995)[5][0-9]{8}"
              maxlength="13"
              placeholder="+995551123456"
              title="უნდა აკმაყოფილებდეს ქართული ნომრის ფორმატს"
              required
            />
            <i class="fa-solid fa-circle-check show-number hidden"></i>
            <i class="fa-solid fa-triangle-exclamation hide-number hidden"></i>
            <h6 class="message" style="font-weight: lighter">
              უნდა აკმაყოფილებდეს ქართული მობილური ნომრის ფორმატს
            </h6>
          </label>
        </form>

        <!--Markup for experience page-->
        <form style="width: 55%; float: left" class="experience hide">
          <div class="positionLabel">
            
            <h2 class="positionHead">თანამდებობა</h2>
            <input id="position" class="position" minlength="2" placeholder="დეველოპერი, დიზაინერი, ა.შ" required>
            <i style="margin-top: 14px;" class="fa-solid fa-circle-check show-position hidden"></i>
            <i class="fa-solid fa-triangle-exclamation hide-position hidden"></i>
            <h6 class="message" style="font-weight: lighter">
              მინიმუმ 2 სიმბოლო
            </h6>
          </div>

          <div for="employer" class="employerLabel">
            <h2 class="employerHead">დამსაქმებელი</h2>
            <input id="employer" class="employer" minlength="2" placeholder="დამსაქმებელი" required>
            <i style="margin-top: 13px;" class="fa-solid fa-circle-check show-employer hidden"></i>
            <i class="fa-solid fa-triangle-exclamation hide-employer hidden"></i>
            <h6 class="message" style="font-weight: lighter">
              მინიმუმ 2 სიმბოლო
            </h6>
          </div>

          <div class="dateLabel">
            <div class="date1">
              <h2 class="dateHead">
                დაწყების რიცხვი
              </h2>
              <input class="startt" id="start" type="date" required>
            </div>
            
            
              <div class="date2">
                <h2 class="dateHead">
                  დასრულების რიცხვი
                </h2>
                <input class="end" id="end" type="date" required>
              </div>
          </div>
          <div class="job">
            <h2 class="dateHead">აღწერა</h2>
            <textarea class="jobDescription" id='jobDescription' placeholder="როლი თანამდებობაზე და ზოგადი აღწერა" minlength="1" required></textarea>
          </div>
          <hr class="underLine">

          <button type="button" class="addExperience">მეტი გამოცდილების დამატება</button>
        </form>

           <!--Education markup-->
        <form style="width: 55%; float: left" class="education hide">
        <div class="uniLabel">
          <h2 class="dateHead">
                  სასწავლებელი
                </h2>
                <input class="university" id='university' minlength="2"  required>
                <i class="fa-solid fa-circle-check show-university hidden" style="margin-top: 14px;"></i>
              <i
                class="fa-solid fa-triangle-exclamation hide-university hidden "
              ></i>
                <h6 class="message" style="font-weight: lighter">
                  მინიმუმ 2 სიმბოლო
                </h6>
        </div>
        <div class="degreeLabel">
          <div class="degrees">
            <h2 class="dateHead">
              ხარისხი
            </h2>
            <select class="degree" id="degree">
              <option class="options" selected disabled required>აირჩიეთ ხარისხი</option>
            </select>
            
          </div>
          <div class="eduDate">
            <h2 class="dateHead">
              დასრულების რიცხვი
            </h2>
            <input class="eduDate" id="eduEnd" type="date" required>
          </div>
        </div>

        <div class="edu">
          <h2 class="dateHead">აღწერა</h2>
          <textarea class="eduDescription" id="eduDescription" placeholder="განათლების აღწერა" minlength="1" required></textarea>
        </div>

        <hr class="underLine">

          <button type="button" class="addEducation">სხვა სასწავლებლის დამატება</button>
        </form>
      
        
        <div class="navigation">
          <button class="backWard hidden" type="button">უკან</button>
          <button class="submit" type="button" >შემდეგი</button>
        </div>  
        
        
<!-- Resume markup -->
        <div style="width: 45%" class="resume">
          <div class="cvContent">
            <div class="infoCV">
              <h1 class="fullName" value="ragaca"></h1>
            <h4 class="resumeEmail"><i class="fa-solid fa-at"></i></h4>
            <h4 class="resumeNumber"><i class="fa-solid fa-phone"></i></h4>
            <h3 class="aboutMeCv hidden">ჩემ შესახებ</h3>
            <p class="resumeDetails"></p>
             </div>
            <div class="imageCv">
            <img src="" class="resumeImg hidden" />
         
            </div>
            
          </div>
          
          <div class="experienceCV hide">
            <hr>
            <h2 class="experienceHeader">გამოცდილება</h2>
            <p class="positionCV"></p>
            <h5 class="startEnd"></h5>
            <h5 class="descriptionCv"></h5>
          </div>
          <div class="educationCV hide">
            <hr>
            <h2 class="educationHeader">განათლება</h2>
            <p class="universityCV"></p>
            <h5 class="eduEnd"></h5>
            <h5 class="eduDescriptionCV"></h5>
          </div>
          <div class="succes hidden">
            <div class="exit">
              <i class="fa-solid fa-xmark remove"></i>
            </div>
            <p class="succesMessage">რეზიუმე წარმატებით გაიგზავნა🎉</p>
          </div>
          

          <div class="icon">
            <img class="logoIcon" src="./images/logo-icon.svg" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
